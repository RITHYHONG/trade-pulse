runConfig:
  minInstances: 0

env:
  - variable: NEXT_PUBLIC_FMP_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FINNHUB_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: DEEPSEEK_API_KEY
    secret: deepseek-api-key
    availability:
      - RUNTIME
  - variable: CRON_SECRET
    secret: cron-secret
    availability:
      - RUNTIME
