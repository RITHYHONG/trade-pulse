name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  # Dummy Firebase vars so Next.js can build without real credentials
  NEXT_PUBLIC_FIREBASE_API_KEY: dummy
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-DUMMY
  NEXTAUTH_SECRET: ci-secret
  DATABASE_URL: file:./dev.db

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter=@trade-pulse/web

      - name: Type-check
        run: pnpm turbo run type-check --filter=@trade-pulse/web
        continue-on-error: true

      - name: Test
        run: pnpm turbo run test --filter=@trade-pulse/web
